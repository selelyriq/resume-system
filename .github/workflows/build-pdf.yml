name: Build PDF Resume

on:
  push:
    paths:
      - 'resume/**/*.md'
      - '.github/workflows/build-pdf.yml'
    branches:
      - main
      - automation-devops
      - security-enterprise
      - ai-infra
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-extra texlive-fonts-recommended
      
      - name: Build PDF from Markdown
        run: |
          mkdir -p build
          pandoc resume/main/resume.md \
            -f markdown \
            -t pdf \
            -V geometry:margin=0.75in \
            -V fontsize=11pt \
            -V colorlinks=true \
            --pdf-engine=pdflatex \
            -o build/Lyriq-Davis-Automation-Resume.pdf
      
      - name: Verify PDF created
        run: |
          if [ -f build/Lyriq-Davis-Automation-Resume.pdf ]; then
            echo "PDF successfully created"
            ls -lh build/Lyriq-Davis-Automation-Resume.pdf
          else
            echo "PDF creation failed"
            exit 1
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: build/Lyriq-Davis-Automation-Resume.pdf
          retention-days: 30
      
      - name: Commit and push PDF to branch
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          cp build/Lyriq-Davis-Automation-Resume.pdf Lyriq-Davis-Security-Resume.pdf
          git add -f Lyriq-Davis-Security-Resume.pdf
          git commit -m "chore: update resume PDF" || echo "No changes to commit"
          git push
