name: Build PDF Resume

on:
  push:
    paths:
      - 'resume/**/*.md'
      - '.github/workflows/build-pdf.yml'
      - '.github/scripts/generate-latex.py'
    branches:
      - platform-engineering
      - infra-automation
      - ai-ml-infra
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install TeX packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            cm-super

      - name: Install Python dependencies
        run: pip install anthropic

      - name: Generate LaTeX via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/generate-latex.py

      - name: Compile PDF
        run: |
          cd build
          pdflatex -interaction=nonstopmode resume.tex
          pdflatex -interaction=nonstopmode resume.tex

      - name: Verify PDF created
        run: |
          if [ -f build/resume.pdf ]; then
            echo "PDF successfully created"
            ls -lh build/resume.pdf
          else
            echo "PDF creation failed"
            exit 1
          fi

      - name: Set PDF filename
        run: |
          case "$GITHUB_REF_NAME" in
            platform-engineering) echo "PDF_NAME=Lyriq-Davis-Platform-Engineering.pdf" >> $GITHUB_ENV ;;
            infra-automation)     echo "PDF_NAME=Lyriq-Davis-Infra-Automation.pdf" >> $GITHUB_ENV ;;
            ai-ml-infra)          echo "PDF_NAME=Lyriq-Davis-AI-ML-Infra.pdf" >> $GITHUB_ENV ;;
            *)                    echo "PDF_NAME=Lyriq-Davis-Resume.pdf" >> $GITHUB_ENV ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PDF_NAME }}
          path: build/resume.pdf
          retention-days: 30

      - name: Commit and push PDF to branch
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git rm -f AI-Infrastructure-Resume.pdf 2>/dev/null || true
          cp build/resume.pdf "$PDF_NAME"
          git add -f "$PDF_NAME"
          git commit -m "chore: update resume PDF" || echo "No changes to commit"
          git push

